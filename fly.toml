# fly.toml — Fly.io configuration for UC Inventory.
#
# Set the `app` name to whatever you registered via `fly apps create`.
# The SQLite volume must be created once via:
#   fly volumes create data --size 1 --region <region>
# (Migrations run on machine start via scripts/fly-entrypoint.sh so they see
# the mounted volume; that's why there's no release_command here.)

app = "inventory-tracking-loop"
primary_region = "syd"

[build]
  dockerfile = "Dockerfile"

[[mounts]]
  source = "data"
  destination = "/data"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

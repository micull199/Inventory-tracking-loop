# fly.toml app configuration file generated for inventory-tracking-loop-tospkq on 2026-05-11T06:13:15Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'inventory-tracking-loop-tospkq'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[[mounts]]
  source = 'data'
  destination = '/data'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256

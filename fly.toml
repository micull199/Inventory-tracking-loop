# fly.toml — Fly.io configuration for UC Inventory.
# Generated by the P4 slice; customise `app` and `primary_region` for your
# deployment. Run `fly launch --copy-config` on first deploy.

app = "uc-inventory"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[deploy]
  release_command = "alembic upgrade head"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1

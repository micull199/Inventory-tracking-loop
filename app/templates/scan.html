{% extends "base.html" %}
{% block title %}Scan — UC Inventory{% endblock %}
{% block content %}
    <h1 data-testid="scan-heading">Scan</h1>
    <p data-testid="scan-instructions">
        Scan an item's QR code or type its SKU and press Enter.
    </p>

    <form method="post" action="/scan/resolve" data-testid="scan-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <p>
            <label for="scan-code">Code</label><br>
            <input type="text" id="scan-code" name="code"
                   data-testid="scan-code-input"
                   autocomplete="off" autofocus required
                   maxlength="255">
        </p>

        <p>
            <button type="submit" class="button" data-testid="scan-submit">
                Find item
            </button>
        </p>
    </form>
{% endblock %}

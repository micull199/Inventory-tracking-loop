{% extends "base.html" %}
{% block title %}{{ title }} — UC Inventory{% endblock %}
{% block content %}
    <p><a href="/admin/taxonomy">&larr; Back to taxonomy</a></p>
    <h1>{{ title }}</h1>

    <form method="post" action="{{ action }}" data-testid="taxonomy-form">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <p>
            <label for="name">Name <span aria-hidden="true">*</span></label><br>
            <input type="text" id="name" name="name" required
                   value="{{ form.name }}"
                   data-testid="taxonomy-name-input"
                   maxlength="255">
        </p>

        <p>
            <label for="sort_order">Sort order</label><br>
            <input type="number" id="sort_order" name="sort_order"
                   value="{{ form.sort_order }}"
                   data-testid="taxonomy-sort-order-input"
                   step="1">
            <br>
            <small>Optional. Lower numbers appear first. Leave blank on a new category to append it to the end (steps of 10).</small>
        </p>

        <p>
            <button type="submit" class="button" data-testid="taxonomy-submit">
                {% if node %}Save changes{% else %}Create category{% endif %}
            </button>
        </p>
    </form>
{% endblock %}

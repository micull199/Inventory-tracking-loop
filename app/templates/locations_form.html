{% extends "base.html" %}
{% import "_components.html" as c %}
{% block title %}{{ title }} — UC Inventory{% endblock %}
{% block content %}
    {% call c.page_header(title) %}
        <a class="uc-btn uc-btn--ghost" href="/admin/locations">&larr; Back</a>
    {% endcall %}

    {% call c.card() %}
        <form method="post" action="{{ action }}" data-testid="location-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <section class="uc-section">
                <div class="uc-field">
                    <label class="uc-label" for="name">Name <span class="uc-required" aria-hidden="true">*</span></label>
                    <input class="uc-input" type="text" id="name" name="name" required
                           value="{{ form.name }}"
                           data-testid="location-name-input"
                           maxlength="255">
                </div>

                <div class="uc-field">
                    <label class="uc-label" for="notes">Notes</label>
                    <textarea class="uc-textarea" id="notes" name="notes"
                              data-testid="location-notes-input"
                              maxlength="2000"
                              rows="4">{{ form.notes }}</textarea>
                </div>
            </section>

            {% call c.form_actions() %}
                <button class="uc-btn uc-btn--primary" type="submit" data-testid="location-submit">
                    {% if location %}Save changes{% else %}Create location{% endif %}
                </button>
                <a class="uc-btn uc-btn--secondary" href="/admin/locations">Cancel</a>
            {% endcall %}
        </form>
    {% endcall %}
{% endblock %}

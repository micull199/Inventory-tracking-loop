<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}UC Inventory{% endblock %}</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
               max-width: 720px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
        a.button { display: inline-block; padding: 0.5rem 1rem; background: #1a73e8;
                   color: white; text-decoration: none; border-radius: 4px; }
        nav { margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid #ddd; }
        nav .right { float: right; }
        nav a { margin-right: 1rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <span class="right">
            {% if current_user %}
                {{ current_user.email }}
                (<span data-testid="user-status">{{ current_user.status.value }}</span>)
                <form method="post" action="/auth/logout" style="display:inline">
                    <button type="submit">Sign out</button>
                </form>
            {% endif %}
        </span>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>

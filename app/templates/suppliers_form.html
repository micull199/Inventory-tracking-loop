{% extends "base.html" %}
{% import "_components.html" as c %}
{% block title %}{{ title }} — UC Inventory{% endblock %}
{% block content %}
    {% call c.page_header(title) %}
        <a class="uc-btn uc-btn--ghost" href="/admin/suppliers">&larr; Back</a>
    {% endcall %}

    {% call c.card() %}
        <form method="post" action="{{ action }}" data-testid="supplier-form">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <section class="uc-section">
                <div class="uc-field">
                    <label class="uc-label" for="name">Name <span class="uc-required" aria-hidden="true">*</span></label>
                    <input class="uc-input" type="text" id="name" name="name" required
                           value="{{ form.name }}"
                           data-testid="supplier-name-input"
                           maxlength="255">
                </div>

                <div class="uc-grid-2">
                    <div class="uc-field">
                        <label class="uc-label" for="email">Email</label>
                        <input class="uc-input" type="email" id="email" name="email"
                               value="{{ form.email }}"
                               data-testid="supplier-email-input"
                               maxlength="255">
                    </div>

                    <div class="uc-field">
                        <label class="uc-label" for="phone">Phone</label>
                        <input class="uc-input" type="tel" id="phone" name="phone"
                               value="{{ form.phone }}"
                               data-testid="supplier-phone-input"
                               maxlength="64">
                    </div>
                </div>

                <div class="uc-field">
                    <label class="uc-label" for="notes">Notes</label>
                    <textarea class="uc-textarea" id="notes" name="notes"
                              data-testid="supplier-notes-input"
                              maxlength="2000"
                              rows="4">{{ form.notes }}</textarea>
                </div>
            </section>

            {% call c.form_actions() %}
                <button class="uc-btn uc-btn--primary" type="submit" data-testid="supplier-submit">
                    {% if supplier %}Save changes{% else %}Create supplier{% endif %}
                </button>
                <a class="uc-btn uc-btn--secondary" href="/admin/suppliers">Cancel</a>
            {% endcall %}
        </form>
    {% endcall %}
{% endblock %}

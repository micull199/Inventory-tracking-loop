name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_uc
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install Python and dependencies
        run: uv sync

      - name: Install Playwright browsers
        run: uv run playwright install chromium --with-deps

      - name: Lint
        run: make lint

      - name: Type check
        run: make typecheck

      - name: Unit and integration tests (SQLite)
        run: make test

      - name: Unit and integration tests (Postgres parity)
        env:
          TEST_DATABASE_URL: postgresql+psycopg://test:test@localhost/test_uc
        run: make test

      - name: End-to-end tests
        run: make e2e
